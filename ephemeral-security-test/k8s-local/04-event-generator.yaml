apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-generator
  namespace: ephemeral-test
  labels:
    app: event-generator
    controller: deployment
    pattern: event-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-generator
  template:
    metadata:
      labels:
        app: event-generator
        controller: deployment
        pattern: event-generator
    spec:
      serviceAccountName: event-generator
      containers:
        - name: generator
          image: bitnami/kubectl:latest
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                TYPE=$((RANDOM % 3))
                case $TYPE in
                  0)
                    kubectl run temp-pod-$(date +%s) \
                      --image=busybox:1.36 \
                      --restart=Never \
                      --rm \
                      -- sleep 20
                    ;;
                  1)
                    kubectl create configmap temp-cm-$(date +%s) \
                      --from-literal=key=value \
                      -n ephemeral-test
                    sleep 5
                    kubectl delete configmap temp-cm-$(date +%s) -n ephemeral-test 2>/dev/null || true
                    ;;
                  2)
                    kubectl scale deployment event-generator --replicas=$((RANDOM % 2 + 1)) -n ephemeral-test
                    sleep 10
                    ;;
                esac
                sleep $((RANDOM % 30 + 15))
              done
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: event-generator
  namespace: ephemeral-test
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: event-generator
  namespace: ephemeral-test
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps"]
    verbs: ["create", "delete", "get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: event-generator
  namespace: ephemeral-test
subjects:
  - kind: ServiceAccount
    name: event-generator
    namespace: ephemeral-test
roleRef:
  kind: Role
  name: event-generator
  apiGroup: rbac.authorization.k8s.io

