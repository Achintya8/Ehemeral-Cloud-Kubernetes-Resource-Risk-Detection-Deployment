apiVersion: batch/v1
kind: CronJob
metadata:
  name: data-processor
  namespace: ephemeral-test
  labels:
    app: data-processor
    controller: cronjob
    pattern: batch-job
    team: data-engineering
    ephemeral: "true"
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 60
      activeDeadlineSeconds: 90
      parallelism: 1
      completions: 3
      completionMode: Indexed
      template:
        metadata:
          labels:
            app: data-processor
            controller: cronjob
            pattern: batch-job
            ephemeral: "true"
          annotations:
            ephemeral.ttl/seconds: "90"
            ephemeral.pattern/type: "batch-job"
            ephemeral.controller/name: "data-processor"
        spec:
          restartPolicy: OnFailure
          serviceAccountName: data-processor
          containers:
            - name: processor
              image: busybox:1.36
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "100m"
                  memory: "128Mi"
              env:
                - name: JOB_COMPLETION_INDEX
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
              command:
                - /bin/sh
                - -c
                - |
                  echo "[$(date -Iseconds)] Worker $JOB_COMPLETION_INDEX starting"
                  sleep $((RANDOM % 10 + 5))
                  echo "[$(date -Iseconds)] Worker $JOB_COMPLETION_INDEX complete"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: data-processor
  namespace: ephemeral-test

