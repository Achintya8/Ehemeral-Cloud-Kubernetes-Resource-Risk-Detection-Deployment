apiVersion: v1
kind: Namespace
metadata:
  name: ephemeral-test
  labels:
    environment: security-testing
    ephemeral: "true"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ephemeral-test-quota
  namespace: ephemeral-test
spec:
  hard:
    pods: "20"
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ephemeral-test-limits
  namespace: ephemeral-test
spec:
  limits:
    - default:
        cpu: "200m"
        memory: "256Mi"
      defaultRequest:
        cpu: "50m"
        memory: "64Mi"
      type: Container

